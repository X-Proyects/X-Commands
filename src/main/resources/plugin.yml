name: X-Commands
version: 2.6
main: com.fabian.XCommands
api-version: 1.18
folia-supported: true
authors: [Fabián ツ]
description: Custom commands plugin
softdepend: [Vault, PlaceholderAPI]

commands:
  xc:
    description: Main X-Commands command
    usage: /xc [-gui|command|reload|update]
    aliases: [x, xcommands, x-commands]
    permission: xcommands.admin

permissions:
  xcommands.admin:
    description: Access to all admin commands
    default: op
    children:
      xcommands.admin.gui: true
      xcommands.admin.create: true
      xcommands.admin.delete: true
      xcommands.admin.edit: true
      xcommands.admin.reload: true
      xcommands.admin.update: true
      xcommands.admin.version: true
      xcommands.admin.forcemessages: true
  xcommands.admin.gui:
    description: Permission to open the GUI editor
    default: op
  xcommands.admin.create:
    description: Permission to create new commands
    default: op
  xcommands.admin.delete:
    description: Permission to delete commands
    default: op
  xcommands.admin.edit:
    description: Permission to edit commands and actions
    default: op
  xcommands.admin.reload:
    description: Permission to reload the plugin
    default: op
  xcommands.admin.update:
    description: Permission to check for updates
    default: op
  xcommands.admin.version:
    description: Permission to see plugin and server version info
    default: op
  xcommands.admin.forcemessages:
    description: Permission to force-reload message files
    default: op

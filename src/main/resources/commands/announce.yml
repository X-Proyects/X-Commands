# ==============================================================================
#                      X-Commands: Custom Command Configuration
# ==============================================================================
# This file defines a dynamic announcement command that uses {args}.
# You can create as many .yml files as you want in this folder.

# [name]
# The primary name of the command. Players will use this as /<name>
name: announce

# [aliases]
# A list of alternative names for this command.
aliases:
  - announcement
  - aviso

# [item]
# Defines the icon for this command if it's displayed in a GUI menu.
item:
  material: NOTE_BLOCK
  display-name: "&6Announcements"

# [description]
# A brief explanation of what the command does.
description: "&7Example of dynamic arguments using {args}"

# [register]
# If true, the command is automatically registered in the server's command map.
register: true

# [permission]
# The permission node required to execute this command.
permission: xcommands.staff.announce

# [world]
# Restricts the command to specific worlds.
# Leave empty ("") for all worlds.
world: ""

# [cooldown]
# The wait time (in seconds) between executions for each player.
cooldown: 0

# [interval]
# The interval (in seconds) for automatic execution.
# Use 0 to disable automatic execution.
interval: 0

# [actions]
# A list of actions that will be performed when the command is run.
# Actions are executed sequentially (top to bottom).
#
# Available Tags:
#   [MESSAGE] <text>                     - Private message to player
#   [BROADCAST] <text>                    - Message to all players
#   [ACTIONBAR] <text>                   - Message above hotbar
#   [TITLE] <title>;<subtitle>;<fadeIn>;<stay>;<fadeOut> - Big screen title
#   [CONSOLE] <command>                   - Execute command from console
#   [PLAYER] <command>                    - Execute command as the player
#   [SOUND] <sound>;<volume>;<pitch>     - Play a sound
#   [EFFECT] <effect>;<ticks>;<level>     - Give potion effect
#   [PARTICLE] <particle> <x> <y> <z> <count> - Spawn particles
#   [HEAL]                                - Restore player health
#   [FEED]                                - Restore player hunger
#   [DAMAGE] <amount>                     - Damage the player
#   [GIVE] <material>;<amount>;<name>     - Give item with custom name
#   [TELEPORT] <world>;<x>;<y>;<z>      - Teleport player
#   [GIVE_MONEY] <amount>                 - Deposit money (Vault)
#   [TAKE_MONEY] <amount>                 - Withdraw money (Vault)
#   [KICK] <reason>                       - Kick the player
#   [BUNGEE] <server>                     - Send player to a Bungee server
#   [VELOCITY] <server>                   - Send player to a Velocity server
#   [SENT_TO] <server>                    - Send player to a proxy server
#   [CLOSE]                               - Close player's current inventory
#   [DELAY] <ticks>                       - Wait before next action
#
# Conditionals (Skips next action if false):
#   [IF_PERMISSION] <node>                - If player has permission
#   [IF_PERMISSION_NOT] <node>            - If player lacks permission
#   [IF_MONEY] <amount>                   - If player has enough money
#   [IF_OP]                               - If player is server operator
#   [IF_WORLD] <world>                    - If player is in specific world
#   [IF_CHANCE] <percentage>              - Random chance (0-100)
#
# You can also use ! prefix for NOT conditions: ![IF_PERMISSION] <node>
#
# Argument Placeholders:
#   {args}  - Full text after the command
#   {0}     - First argument word
#   {1}     - Second argument word, etc.
#
actions:
  - "[BROADCAST] &8&l[&6&lANNOUNCE&8&l] &f{args}"
  - "[SOUND] BLOCK_NOTE_BLOCK_PLING;1.0;1.5"
  - "[MESSAGE] &aAnnouncement sent successfully!"
